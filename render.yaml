services:
  - type: web
    name: schemascribe-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
    healthCheckPath: /docs
